services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: heartland
      POSTGRES_PASSWORD: heartland123
      POSTGRES_DB: heartland_homes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartland -d heartland_homes"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://heartland:heartland123@db:5432/heartland_homes
      JWT_SECRET: docker-jwt-secret-key-min-32-characters-long
      JWT_EXPIRATION: 1h
      PORT: "3000"
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
