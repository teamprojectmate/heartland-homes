databases:
  - name: heartland-homes-db
    plan: free
    databaseName: heartland_homes
    user: heartland

services:
  - type: web
    name: heartland-homes-api
    plan: free
    runtime: node
    rootDir: backend-nest
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main.js
    healthCheckPath: /auth/login
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: heartland-homes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 1h
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://heartland-homes.vercel.app
