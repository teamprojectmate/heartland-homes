name: CI

on:
  push:
    branches: [main, frontend-develop]
  pull_request:
    branches: [main, frontend-develop]

jobs:
  check:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Biome lint
        run: npx biome check src/

      - name: Build
        run: npm run build
